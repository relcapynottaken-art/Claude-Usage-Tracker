<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        width: 240px;
        margin: 0;
        padding: 12px 14px;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
        color: #1f2937;
      }
      h1 { font-size: 13px; margin: 0 0 10px; }
      .row { margin: 10px 0; }
      .head { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 4px; }
      .head .v { font-weight: 700; font-variant-numeric: tabular-nums; }
      .track { height: 7px; border-radius: 999px; background: #e5e7eb; overflow: hidden; }
      .fill { height: 100%; width: 0%; border-radius: 999px; transition: width .3s; }
      .meta { font-size: 11px; color: #6b7280; margin-top: 2px; }
      .foot { font-size: 11px; color: #9ca3af; margin-top: 12px; }
      a { color: #3b82f6; text-decoration: none; }
    </style>
  </head>
  <body>
    <h1>Claude Usage</h1>

    <div class="row">
      <div class="head"><span>Session (5h)</span><span class="v" id="sv">—</span></div>
      <div class="track"><div class="fill" id="sf"></div></div>
      <div class="meta" id="sm"></div>
    </div>

    <div class="row">
      <div class="head"><span>Weekly (7d)</span><span class="v" id="wv">—</span></div>
      <div class="track"><div class="fill" id="wf"></div></div>
      <div class="meta" id="wm"></div>
    </div>

    <div class="foot" id="foot">Open <b>claude.ai → Settings → Usage</b> once so the tracker can learn your endpoint.</div>
    <div class="foot"><a href="#" id="opts">Settings</a></div>

    <script src="popup.js"></script>
  </body>
</html>
